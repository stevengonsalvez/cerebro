<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#566"/>
    </marker>
    <marker id="arrfb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#00897b"/>
    </marker>
  </defs>

  <rect width="900" height="760" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-weight="800" font-size="19" fill="#10243e">CEREBRO — daily tech-signal pipeline</text>
  <text x="450" y="48" text-anchor="middle" font-size="10" fill="#5b6b7d">local-first · Python · Claude Code (no API keys) → Obsidian · 10 channels</text>

  <!-- SOURCES (10) -->
  <g>
    <rect x="6"   y="66" width="82" height="46" rx="7" fill="#e7f0fd" stroke="#4a86e8"/>
    <text x="47"  y="88"  text-anchor="middle" font-weight="700" font-size="10" fill="#10243e">Hacker News</text><text x="47"  y="103" text-anchor="middle" font-size="8" fill="#5b6b7d">front-page · Algolia</text>
    <rect x="95"  y="66" width="82" height="46" rx="7" fill="#e7f0fd" stroke="#4a86e8"/>
    <text x="136" y="88"  text-anchor="middle" font-weight="700" font-size="10" fill="#10243e">Show HN</text><text x="136" y="103" text-anchor="middle" font-size="8" fill="#5b6b7d">Algolia · showcase</text>
    <rect x="184" y="66" width="82" height="46" rx="7" fill="#e7f0fd" stroke="#4a86e8"/>
    <text x="225" y="88"  text-anchor="middle" font-weight="700" font-size="10" fill="#10243e">Launch HN</text><text x="225" y="103" text-anchor="middle" font-size="8" fill="#5b6b7d">YC launches</text>
    <rect x="273" y="66" width="82" height="46" rx="7" fill="#e7f0fd" stroke="#4a86e8"/>
    <text x="314" y="88"  text-anchor="middle" font-weight="700" font-size="10" fill="#10243e">YC RFS</text><text x="314" y="103" text-anchor="middle" font-size="8" fill="#5b6b7d">ideas · scrape</text>
    <rect x="362" y="66" width="82" height="46" rx="7" fill="#e7f0fd" stroke="#4a86e8"/>
    <text x="403" y="88"  text-anchor="middle" font-weight="700" font-size="10" fill="#10243e">Reddit</text><text x="403" y="103" text-anchor="middle" font-size="8" fill="#5b6b7d">6 subs · RSS</text>
    <rect x="451" y="66" width="82" height="46" rx="7" fill="#e7f0fd" stroke="#4a86e8"/>
    <text x="492" y="88"  text-anchor="middle" font-weight="700" font-size="10" fill="#10243e">GitHub</text><text x="492" y="103" text-anchor="middle" font-size="8" fill="#5b6b7d">trending scrape</text>
    <rect x="540" y="66" width="82" height="46" rx="7" fill="#e7f0fd" stroke="#4a86e8"/>
    <text x="581" y="88"  text-anchor="middle" font-weight="700" font-size="10" fill="#10243e">OSSInsight</text><text x="581" y="103" text-anchor="middle" font-size="8" fill="#5b6b7d">star-velocity</text>
    <rect x="629" y="66" width="82" height="46" rx="7" fill="#e7f0fd" stroke="#4a86e8"/>
    <text x="670" y="88"  text-anchor="middle" font-weight="700" font-size="10" fill="#10243e">RSS</text><text x="670" y="103" text-anchor="middle" font-size="8" fill="#5b6b7d">10 feeds</text>
    <rect x="718" y="66" width="82" height="46" rx="7" fill="#e7f0fd" stroke="#4a86e8"/>
    <text x="759" y="88"  text-anchor="middle" font-weight="700" font-size="10" fill="#10243e">Gmail</text><text x="759" y="103" text-anchor="middle" font-size="8" fill="#5b6b7d">newsletters · gws</text>
    <rect x="807" y="66" width="82" height="46" rx="7" fill="#e7f0fd" stroke="#4a86e8"/>
    <text x="848" y="88"  text-anchor="middle" font-weight="700" font-size="10" fill="#10243e">X</text><text x="848" y="103" text-anchor="middle" font-size="8" fill="#5b6b7d">twscrape</text>
  </g>

  <!-- converge rail -->
  <path stroke="#566" stroke-width="1.6" fill="none" d="M47 112 V124 M136 112 V124 M225 112 V124 M314 112 V124 M403 112 V124 M492 112 V124 M581 112 V124 M670 112 V124 M759 112 V124 M848 112 V124"/>
  <path stroke="#566" stroke-width="1.6" fill="none" d="M47 124 H848"/>
  <path stroke="#566" stroke-width="1.6" fill="none" d="M448 124 V140" marker-end="url(#arr)"/>

  <!-- FETCH -->
  <rect x="20" y="142" width="860" height="34" rx="7" fill="#f1f4f8" stroke="#9aa7b4"/>
  <text x="450" y="163" text-anchor="middle" font-weight="700" font-size="12" fill="#10243e">fetch — concurrent (ThreadPoolExecutor) · per-source try/except · X &amp; Gmail graceful-skip · → list[Signal] · per-source health logged</text>
  <path stroke="#566" stroke-width="1.6" fill="none" d="M450 176 V190" marker-end="url(#arr)"/>

  <!-- JUNK-GATE -->
  <rect x="190" y="192" width="520" height="34" rx="8" fill="#ede7f6" stroke="#7e57c2"/>
  <text x="450" y="209" text-anchor="middle" font-weight="700" font-size="12" fill="#10243e">junk-gate</text>
  <text x="450" y="221" text-anchor="middle" font-size="9.5" fill="#5b6b7d">drop empty / non-English titles — lenient; triage does the real filtering</text>
  <path stroke="#566" stroke-width="1.6" fill="none" d="M450 226 V240" marker-end="url(#arr)"/>

  <!-- DEDUP / WATERMARK -->
  <rect x="190" y="242" width="520" height="58" rx="8" fill="#ede7f6" stroke="#7e57c2"/>
  <text x="450" y="261" text-anchor="middle" font-weight="700" font-size="12" fill="#10243e">dedup + watermark</text>
  <text x="450" y="277" text-anchor="middle" font-size="9.5" fill="#5b6b7d">canonical URL → sha256 url-hash + 63-bit simhash</text>
  <text x="450" y="291" text-anchor="middle" font-size="9.5" fill="#5b6b7d">drop in-run dups · 14-day SQLite <tspan font-weight="700">seen</tspan> window · simhash Hamming ≤ 3 near-dups</text>
  <path stroke="#566" stroke-width="1.6" fill="none" d="M450 300 V314" marker-end="url(#arr)"/>

  <!-- PRE-RANK (software) -->
  <rect x="190" y="316" width="520" height="42" rx="8" fill="#ede7f6" stroke="#7e57c2"/>
  <text x="450" y="334" text-anchor="middle" font-weight="700" font-size="12" fill="#10243e">pre-rank — software, no LLM</text>
  <text x="450" y="349" text-anchor="middle" font-size="9.5" fill="#5b6b7d">interest-term overlap ± learned feedback · keep top 180 (≈ halves triage tokens)</text>
  <path stroke="#566" stroke-width="1.6" fill="none" d="M450 358 V372" marker-end="url(#arr)"/>

  <!-- TRIAGE (LLM) -->
  <rect x="190" y="374" width="520" height="44" rx="8" fill="#fff3e0" stroke="#fb8c00"/>
  <text x="450" y="392" text-anchor="middle" font-weight="700" font-size="12" fill="#10243e">triage — claude -p --model haiku  (claude-haiku-4-5)</text>
  <text x="450" y="408" text-anchor="middle" font-size="9.5" fill="#5b6b7d">batched 60/call · JSON score + category + tags + reason · keep ≥ 0.5, sort desc</text>
  <path stroke="#566" stroke-width="1.6" fill="none" d="M450 418 V432" marker-end="url(#arr)"/>

  <!-- EXTRACT + COMMENTS -->
  <rect x="190" y="434" width="520" height="44" rx="8" fill="#fff3e0" stroke="#fb8c00"/>
  <text x="450" y="452" text-anchor="middle" font-weight="700" font-size="12" fill="#10243e">top 25 → trafilatura extract → HN comment-enrich</text>
  <text x="450" y="468" text-anchor="middle" font-size="9.5" fill="#5b6b7d">fetch + clean pages · batched Haiku "community take" on HN / Show HN / Launch HN threads</text>
  <path stroke="#566" stroke-width="1.6" fill="none" d="M450 478 V492" marker-end="url(#arr)"/>

  <!-- DIGEST -->
  <rect x="190" y="494" width="520" height="40" rx="8" fill="#fff3e0" stroke="#fb8c00"/>
  <text x="450" y="512" text-anchor="middle" font-weight="700" font-size="12" fill="#10243e">digest — claude -p --model sonnet  (claude-sonnet-4-6)</text>
  <text x="450" y="527" text-anchor="middle" font-size="9.5" fill="#5b6b7d">→ themed "explain-to-me" Markdown briefing</text>
  <path stroke="#566" stroke-width="1.6" fill="none" d="M450 534 V548" marker-end="url(#arr)"/>

  <!-- VAULT -->
  <rect x="190" y="550" width="520" height="58" rx="8" fill="#e8f5e9" stroke="#43a047"/>
  <text x="450" y="570" text-anchor="middle" font-weight="700" font-size="12" fill="#10243e">Obsidian vault  (~/d/git/cerebro-vault)</text>
  <text x="450" y="586" text-anchor="middle" font-size="9.5" fill="#5b6b7d">Daily/&lt;date&gt;.md briefing + Signals/&lt;hash&gt;.md atomic notes (title · reason · rating · community take)</text>
  <text x="450" y="599" text-anchor="middle" font-size="9.5" fill="#5b6b7d">Dataview frontmatter · wikilinks · token usage · dry-run → _scratch/</text>

  <!-- ntfy -->
  <rect x="724" y="556" width="156" height="46" rx="8" fill="#fce4ec" stroke="#e91e63"/>
  <text x="802" y="576" text-anchor="middle" font-weight="700" font-size="12" fill="#10243e">ntfy push</text>
  <text x="802" y="591" text-anchor="middle" font-size="9.5" fill="#5b6b7d">curl (muted in dry-run)</text>
  <path stroke="#566" stroke-width="1.6" fill="none" d="M710 579 H724" marker-end="url(#arr)"/>

  <!-- FEEDBACK LOOP (vault → pre-rank + triage) -->
  <path stroke="#00897b" stroke-width="1.6" fill="none" stroke-dasharray="5 4" d="M190 579 H150 V337 H190" marker-end="url(#arrfb)"/>
  <path stroke="#00897b" stroke-width="1.6" fill="none" stroke-dasharray="5 4" d="M150 396 H190" marker-end="url(#arrfb)"/>
  <text x="86"  y="486" text-anchor="middle" font-size="9" font-weight="700" fill="#00897b">feedback loop</text>
  <text x="86"  y="499" text-anchor="middle" font-size="9" font-weight="700" fill="#00897b">rate notes 1–5 →</text>
  <text x="86"  y="512" text-anchor="middle" font-size="9" font-weight="700" fill="#00897b">pre-rank + triage</text>

  <!-- SQLite state (right) -->
  <rect x="724" y="374" width="156" height="120" rx="8" fill="#eef2f6" stroke="#9aa7b4"/>
  <text x="802" y="394" text-anchor="middle" font-weight="700" font-size="12" fill="#10243e">SQLite state</text>
  <text x="802" y="414" text-anchor="middle" font-size="9.5" fill="#5b6b7d"><tspan font-weight="700">seen</tspan> — dedup watermark</text>
  <text x="802" y="434" text-anchor="middle" font-size="9.5" fill="#5b6b7d"><tspan font-weight="700">runs</tspan> — stats + tokens</text>
  <text x="802" y="454" text-anchor="middle" font-size="9.5" fill="#5b6b7d"><tspan font-weight="700">source_health</tspan> — yield</text>
  <text x="802" y="474" text-anchor="middle" font-size="9.5" fill="#5b6b7d">per source (--health)</text>
  <text x="802" y="488" text-anchor="middle" font-size="8.5" fill="#5b6b7d">gitignored</text>
  <path stroke="#566" stroke-width="1.6" fill="none" stroke-dasharray="3 3" d="M710 271 H724"/>
  <path stroke="#566" stroke-width="1.6" fill="none" stroke-dasharray="3 3" d="M710 159 H724 V374"/>

  <!-- bottom band -->
  <rect x="20" y="628" width="860" height="112" rx="10" fill="#f6f8fa" stroke="#dde3ea"/>
  <text x="40" y="652" font-size="11" fill="#33485c" font-weight="700">Scheduler</text>
  <text x="40" y="670" font-size="11" fill="#33485c">launchd · daily 07:00</text>
  <text x="40" y="686" font-size="11" fill="#33485c">(catch-up on wake)</text>

  <text x="330" y="652" font-size="11" fill="#33485c" font-weight="700">Secrets</text>
  <text x="330" y="670" font-size="11" fill="#33485c">no API keys — Claude Code login</text>
  <text x="330" y="686" font-size="11" fill="#33485c">X via saved cookies / .env · gws OAuth</text>
  <text x="330" y="702" font-size="11" fill="#33485c">gitleaks + GitGuardian (CI) · .env in Bitwarden</text>

  <text x="650" y="652" font-size="11" fill="#33485c" font-weight="700">Cost / run</text>
  <text x="650" y="670" font-size="11" fill="#33485c">≈235k tokens cold · ≈109k warm</text>
  <text x="650" y="686" font-size="11" fill="#33485c">2–4 claude calls · ~$0.34–0.59 equiv</text>
  <text x="650" y="702" font-size="11" fill="#33485c">covered by Claude Code subscription</text>
</svg>
