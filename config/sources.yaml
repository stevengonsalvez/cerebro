# Source config. Toggle + tune per source. Lists are seeds — edit freely.
hackernews:               # front-page top stories (Show HN is now its own channel below)
  enabled: true
  lists: [topstories]
  limit: 60
showhn:                   # Show HN as its own lane — maker launches & demos, tagged `showcase`
  enabled: true
  limit: 40
yc_launches:              # "Launch HN" — YC company launches + batch tag (W25/S25/P26…)
  enabled: true
  limit: 30
yc_rfs:                   # YC Request for Startups — ideas YC wants funded (changes rarely)
  enabled: true
  limit: 20
reddit:
  enabled: true
  subreddits: [ClaudeAI, ChatGPTCoding, LocalLLaMA, AI_Agents, vibecoding, cursor]
  listing: new          # new | hot
  limit: 25
reddit_users:           # roster devs' reddit submissions — `users` auto-filled from cracked_devs.yaml
  enabled: true
  limit: 10             # posts per dev; no score filter possible (RSS carries no score — see adapter note)
github_trending:        # "GitHunt" — repos making the biggest moves (stars gained)
  enabled: true
  since: [daily, weekly] # str or list; daily catches today's movers, weekly the sustained ones
  languages: []          # [] = all languages
github_devs:            # roster devs' recent repo activity — `logins` auto-filled from cracked_devs.yaml
  enabled: true
  per_dev: 5             # max repos per dev per run
  window_days: 14        # only repos pushed within window
  min_stars: 0           # filter noise / scratch repos
ossinsight:             # GitHub star-velocity (most stars GAINED in the window) via api.ossinsight.io
  enabled: true
  period: [past_week]    # past_24_hours | past_week | past_month (str or list)
  languages: [All]
  min_stars: 20          # min stars gained in the period
  max_items: 40
github_search:          # Natural-language GitHub repo/person search, enriched into Signals/Entities
  enabled: true
  queries:
    - "github profile into cursor skill generator"
    - "agent skills marketplace claude code cursor codex"
  target: mixed
  max_items: 20
  enrich_top: 8
  write_entities: false
rss:
  enabled: true
  limit: 20
  feeds:
    # vibe coding / agentic engineering / AI engineering
    - https://simonwillison.net/atom/everything/
    - https://www.latent.space/feed
    - https://www.interconnects.ai/feed
    # Claude Code / Codex / Copilot — tool changelogs + blogs
    - https://github.com/anthropics/claude-code/releases.atom
    - https://github.com/openai/codex/releases.atom
    - https://github.blog/changelog/feed/
    - https://github.blog/feed/
    - https://openai.com/news/rss.xml
    # product launches — topic-filtered downstream by triage ("ProductHunt, not everything")
    - https://www.producthunt.com/feed
seed_urls:                # one-off pinned links Stevie explicitly wants Cerebro to ingest
  enabled: true
  items:
    - title: "Have your agent record video demos of its work with shot-scraper video"
      url: https://simonwillison.net/2026/Jun/30/shot-scraper-video/?utm_source=substack&utm_medium=email
      tags: [agent-evidence, demo-video, shot-scraper, browser-automation]
      note: "Simon Willison source: use shot-scraper video so agents can record browser demo proof-of-work for UI changes, bug repros, and PR evidence."
x:                      # free headless reads via twscrape (your Firefox cookies; no API key)
  enabled: true
  account: stevengonsalvez   # label for the twscrape account (loads your saved x.com cookies)
  search_terms: ["claude code", "agentic coding", "context engineering", "coding agent", "vibe coding"]
  min_likes: 10         # drop zero-engagement noise from search results
  accounts: []          # sourced from config/cracked_devs.yaml — add devs there, not here
  per_query: 12
  explode_min_links: 3  # tweets with >=N external links → one signal per embedded link (listicle explode)
  beast: false              # firehose: pull every tweet in window, analyse all, walk threads
  beast_window_hours: 24    # pull tweets newer than this
  beast_max_per: 500        # safety ceiling per term/account (stop runaway pagination)
  beast_thread_replies: 15  # replies pulled per thread (link-bearing prioritized)
  beast_max_threads: 100    # ceiling on roots we thread-walk (request-budget guard)
  beast_feed: true          # also pull your following-graph feed (only active when beast is on)
  feed_account: stevengonsalvez   # your x handle (whose follow-graph to expand; defaults to `account`)
  beast_feed_max_accounts: 150    # cap accounts expanded — one user_tweets call each (fan-out guard)
  beast_feed_max_per: 100         # tweets per followed account (lower than beast_max_per to avoid a lock)
gmail:
  enabled: true
  label: newsletters
  senders: ["AI Breakfast", "The Rundown", "TLDR", "Ben's Bites", "ByteByteGo"]
  newer_than: 1d
