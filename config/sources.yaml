# Source config. Toggle + tune per source. Lists are seeds — edit freely.
hackernews:               # front-page top stories (Show HN is now its own channel below)
  enabled: true
  lists: [topstories]
  limit: 60
showhn:                   # Show HN as its own lane — maker launches & demos, tagged `showcase`
  enabled: true
  limit: 40
yc_launches:              # "Launch HN" — YC company launches + batch tag (W25/S25/P26…)
  enabled: true
  limit: 30
yc_rfs:                   # YC Request for Startups — ideas YC wants funded (changes rarely)
  enabled: true
  limit: 20
reddit:
  enabled: true
  subreddits: [ClaudeAI, ChatGPTCoding, LocalLLaMA, AI_Agents, vibecoding, cursor]
  listing: new          # new | hot
  limit: 25
github_trending:        # "GitHunt" — repos making the biggest moves (stars gained)
  enabled: true
  since: [daily, weekly] # str or list; daily catches today's movers, weekly the sustained ones
  languages: []          # [] = all languages
ossinsight:             # GitHub star-velocity (most stars GAINED in the window) via api.ossinsight.io
  enabled: true
  period: [past_week]    # past_24_hours | past_week | past_month (str or list)
  languages: [All]
  min_stars: 20          # min stars gained in the period
  max_items: 40
github_search:          # Natural-language GitHub repo/person search, enriched into Signals/Entities
  enabled: true
  queries:
    - "github profile into cursor skill generator"
    - "agent skills marketplace claude code cursor codex"
  target: mixed
  max_items: 20
  enrich_top: 8
  write_entities: false
rss:
  enabled: true
  limit: 20
  feeds:
    # vibe coding / agentic engineering / AI engineering
    - https://simonwillison.net/atom/everything/
    - https://www.latent.space/feed
    - https://www.interconnects.ai/feed
    # Claude Code / Codex / Copilot — tool changelogs + blogs
    - https://github.com/anthropics/claude-code/releases.atom
    - https://github.com/openai/codex/releases.atom
    - https://github.blog/changelog/feed/
    - https://github.blog/feed/
    - https://openai.com/news/rss.xml
    # product launches — topic-filtered downstream by triage ("ProductHunt, not everything")
    - https://www.producthunt.com/feed
x:                      # free headless reads via twscrape (your Firefox cookies; no API key)
  enabled: true
  account: stevengonsalvez   # label for the twscrape account (loads your saved x.com cookies)
  search_terms: ["claude code", "agentic coding", "context engineering", "coding agent", "vibe coding"]
  min_likes: 10         # drop zero-engagement noise from search results
  accounts:             # curators + high-signal follows — all their tweets kept, listicles exploded
    - sentient_agency
    - levelsio
    - theo
    - skirano
    - bcherny
    - mattpocockuk
  per_query: 12
  explode_min_links: 3  # tweets with >=N external links → one signal per embedded link (listicle explode)
gmail:
  enabled: true
  label: newsletters
  senders: ["AI Breakfast", "The Rundown", "TLDR", "Ben's Bites", "ByteByteGo"]
  newer_than: 1d
