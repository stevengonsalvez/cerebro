# Copy to config/settings.yaml (gitignored) and fill with real values.
# This example file contains placeholders ONLY — never put real values here.

vault_path: "./vault"   # the cerebro-vault private submodule (clone --recursive); relative → repo root
dry_run: true                          # writes to _scratch/, mutes ntfy

depth:
  min: 15
  max: 25
  score_threshold: 0.5

dedup_days: 14
prerank_keep: 180        # cheap interest pre-rank keeps top-N before the LLM triage (saves tokens)

# LLM runs via Claude Code on the machine (`claude -p --model <alias>`). No API key.
models:
  triage: haiku        # cheap filter pass
  digest: sonnet       # user-facing "explain-to-me" briefing

ntfy:
  topic: "REPLACE_ME"  # shared secret — only ever in settings.yaml (gitignored)

schedule:
  hour: 7
  minute: 0

# Optional autoresearch signal-export sink (the self-improvement loop's input
# producer, SPEC 3.1 / 5.1). Entirely opt-in: with enabled:false cerebro behaves
# exactly as a standalone install. When enabled, each digest-surviving signal is
# serialized to export/signals-<run_id>.jsonl; when autoresearch_url is set the
# batch is POSTed (chunked at 500) with the Bearer token read from the env var
# named below, and the dedup pass pre-filters already-tried signals via the
# ledger (fail-open). No credentials ever live in this repo: only the env-var
# NAME is configured here; the token itself stays in the shell env / .env.
export:
  enabled: false                   # off by default (no jsonl, no network)
  dir: "./export"                  # signals-<run_id>.jsonl output dir (relative → repo root)
  autoresearch_url: ""             # e.g. https://autoresearch.internal, empty disables POST + ledger pre-filter
  token_env: "AUTORESEARCH_TOKEN"  # env var holding the tenant ingest Bearer token (never a literal token here)
  tenant_id: "REPLACE_ME"          # tenant id stamped on every exported signal
