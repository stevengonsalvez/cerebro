[project]
name = "cerebro"
version = "0.1.0"
description = "Daily tech-signal intelligence pipeline → Obsidian"
requires-python = ">=3.11"
dependencies = ["pyyaml", "requests", "feedparser", "trafilatura"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["cerebro*"]
